name: Update KBO data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update KBO data
        run: node scripts/update-stats.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update KBO data"
          file_pattern: "data/team-stats.json data/team-stats.js data/player-stats.json data/player-stats.js data/player-rankings.json data/player-rankings.js"
